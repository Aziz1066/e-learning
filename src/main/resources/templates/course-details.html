<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EduSpark · Intelligence Apprenante</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
    :root {
        --brand: #6366f1;
        --brand-light: #e0e7ff;
        --surface: rgba(255, 255, 255, 0.7);
        --text-main: #0f172a;
        --text-sub: #64748b;
    }

    body {
        margin: 0;
        font-family: 'Plus Jakarta Sans', sans-serif;
        background: url('https://i.pinimg.com/1200x/95/8b/5a/958b5a0c1e9799570020e370e6e9a4a7.jpg') no-repeat center center fixed;
        background-size: cover;
        height: 100vh;
        overflow: hidden;
    }

    .app-container {
        display: flex;
        height: 100vh;
        background: rgba(248, 250, 252, 0.4);
        backdrop-filter: blur(25px);
        -webkit-backdrop-filter: blur(25px);
    }

    /* SIDEBAR NAV */
    .sidebar {
        width: 320px;
        background: rgba(255, 255, 255, 0.5);
        border-right: 1px solid rgba(255, 255, 255, 0.3);
        display: flex;
        flex-direction: column;
        padding: 40px 24px;
        z-index: 10;
    }

    .logo-area {
        display: flex;
        align-items: center;
        gap: 15px;
        margin-bottom: 48px;
    }

    .logo-icon {
        width: 42px;
        height: 42px;
        background: linear-gradient(135deg, var(--brand), #a855f7);
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        box-shadow: 0 8px 20px rgba(99, 102, 241, 0.3);
        font-size: 1.2rem;
    }

    .logo-text {
        font-size: 1.6rem;
        font-weight: 800;
        color: var(--text-main);
        letter-spacing: -0.8px;
    }

    .nav-label {
        font-size: 0.75rem;
        font-weight: 700;
        text-transform: uppercase;
        color: var(--text-sub);
        letter-spacing: 1px;
        margin-bottom: 16px;
        padding-left: 8px;
    }

    /* MODULES ACCORDION */
    .module-item {
        margin-bottom: 10px;
        border-radius: 18px;
        overflow: hidden;
        transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .module-trigger {
        padding: 18px;
        background: rgba(255, 255, 255, 0.4);
        display: flex;
        justify-content: space-between;
        align-items: center;
        cursor: pointer;
        font-weight: 600;
        font-size: 0.95rem;
        border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .module-item:hover .module-trigger {
        background: rgba(255, 255, 255, 0.8);
        transform: scale(1.02);
    }

    .lessons-list {
        max-height: 0;
        overflow: hidden;
        transition: max-height 0.5s ease-in-out;
        background: rgba(255, 255, 255, 0.2);
    }

    .lesson-link {
        padding: 14px 24px;
        display: flex;
        align-items: center;
        gap: 12px;
        text-decoration: none;
        color: var(--text-sub);
        font-size: 0.9rem;
        transition: 0.2s;
    }

    .lesson-link:hover {
        color: var(--brand);
        background: white;
        padding-left: 30px;
    }

    /* MAIN CONTENT AREA */
    .main-view {
        flex: 1;
        padding: 60px;
        display: flex;
        justify-content: center;
        align-items: center;
        overflow-y: auto;
    }

    .hero-card {
        background: rgba(255, 255, 255, 0.85);
        border-radius: 45px;
        padding: 60px;
        max-width: 850px;
        width: 100%;
        box-shadow: 0 40px 100px rgba(0, 0, 0, 0.05);
        border: 1px solid white;
        animation: slideIn 0.8s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .badge {
        background: var(--brand-light);
        color: var(--brand);
        padding: 8px 20px;
        border-radius: 100px;
        font-size: 0.8rem;
        font-weight: 700;
        margin-right: 10px;
    }

    .hero-card h1 {
        font-size: 3.5rem;
        font-weight: 800;
        color: var(--text-main);
        margin: 24px 0;
        line-height: 1.1;
        letter-spacing: -2px;
    }

    .hero-card p {
        font-size: 1.2rem;
        color: var(--text-sub);
        line-height: 1.7;
        margin-bottom: 40px;
    }

    .progress-track {
        background: #e2e8f0;
        height: 10px;
        border-radius: 10px;
        width: 100%;
        overflow: hidden;
        margin-bottom: 40px;
    }
    .progress-bar {
        width: 65%;
        height: 100%;
        background: linear-gradient(90deg, var(--brand), #a855f7);
    }

    .btn-main {
        background: var(--text-main);
        color: white;
        padding: 20px 40px;
        border-radius: 22px;
        font-weight: 700;
        border: none;
        cursor: pointer;
        transition: 0.3s;
        display: flex;
        align-items: center;
        gap: 15px;
        font-size: 1rem;
    }

    .btn-main:hover {
        transform: translateY(-5px);
        box-shadow: 0 20px 40px rgba(15, 23, 42, 0.2);
    }

    @keyframes slideIn {
        from { opacity: 0; transform: translateY(40px); }
        to { opacity: 1; transform: translateY(0); }
    }
</style>
</head>

<body>

<div class="app-container">
    <aside class="sidebar">
        <!-- LOGO AVEC ICONE DE CERVEAU -->
        <div class="logo-area">
            <div class="logo-icon">
                <i class="fas fa-brain"></i>
            </div>
            <span class="logo-text">EduSpark</span>
        </div>

        <div class="nav-label">Curriculum</div>

        <div th:each="cm : ${course.modules}" class="module-item">
            <div class="module-trigger" onclick="toggleAcc(this)">
                <span th:text="${cm.titre}">Module Name</span>
                <i class="fas fa-plus small"></i>
            </div>
            <div class="lessons-list">
                <a th:each="l : ${cm.lecons}" th:href="@{/apprenant/lecon/{id}(id=${l.id})}" class="lesson-link">
                    <i class="far fa-circle-play"></i>
                    <span th:text="${l.titre}">Lesson</span>
                </a>
            </div>
        </div>
    </aside>

    <main class="main-view">
        <div class="hero-card">
            <div class="badge-row">
                <span class="badge" th:text="${course.categorie}">Technologie</span>
                <span class="badge" th:text="${course.niveau}">Master</span>
            </div>

            <h1 th:text="${course.titre}">Éveillez votre potentiel</h1>
            <p th:text="${course.description}">Accédez à une expérience d'apprentissage fluide, conçue pour transformer vos connaissances en expertises concrètes.</p>

            <div class="progress-section">
                <div style="display:flex; justify-content:space-between; margin-bottom:12px; font-weight:700;">
                    <span>Votre progression</span>
                    <span style="color: var(--brand)">65%</span>
                </div>
                <div class="progress-track">
                    <div class="progress-bar"></div>
                </div>
            </div>

            <div class="btn-group">
                <button class="btn-main">
                    Reprendre le cours <i class="fas fa-chevron-right"></i>
                </button>
            </div>
        </div>
    </main>
</div>

<script>
function toggleAcc(el) {
    const list = el.nextElementSibling;
    const icon = el.querySelector('.fa-plus') || el.querySelector('.fa-minus');
    
    if (list.style.maxHeight) {
        list.style.maxHeight = null;
        icon.classList.replace('fa-minus', 'fa-plus');
    } else {
        list.style.maxHeight = list.scrollHeight + "px";
        icon.classList.replace('fa-plus', 'fa-minus');
    }
}
</script>

</body>
</html>
