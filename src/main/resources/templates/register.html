<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription - E-Learning Platform</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            font-family: 'Inter', sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 50px 0;
        }
        
        .register-card {
            background: white;
            border-radius: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
            animation: fadeInUp 0.6s ease;
        }
        
        .register-left {
            background: linear-gradient(135deg, #667eea, #764ba2);
            padding: 50px;
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        
        .register-right {
            padding: 50px;
        }
        
        .register-title {
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 10px;
        }
        
        .form-control {
            border-radius: 15px;
            padding: 12px 20px;
            border: 2px solid #e0e0e0;
            transition: all 0.3s ease;
        }
        
        .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
        }
        
        .btn-register {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            border-radius: 50px;
            padding: 12px;
            font-weight: 600;
            color: white;
            width: 100%;
            transition: all 0.3s ease;
        }
        
        .btn-register:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .input-group-text {
            background: transparent;
            border-right: none;
            border-radius: 15px 0 0 15px;
        }
        
        .input-group .form-control {
            border-left: none;
            border-radius: 0 15px 15px 0;
        }
        
        .role-option {
            border: 2px solid #e0e0e0;
            border-radius: 15px;
            padding: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
        }
        
        .role-option:hover {
            border-color: #667eea;
            background: #f8f9ff;
        }
        
        .role-option.selected {
            border-color: #667eea;
            background: linear-gradient(135deg, #f8f9ff, #fff);
        }
        
        .role-option input {
            display: none;
        }
        
        .role-icon {
            font-size: 30px;
            margin-bottom: 10px;
        }
        
        .alert-custom {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
            animation: slideIn 0.5s ease;
        }
        
        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-10 col-lg-8">
                <div class="register-card">
                    <div class="row g-0">
                        <div class="col-md-5 register-left">
                            <i class="fas fa-user-plus" style="font-size: 60px; margin-bottom: 20px;"></i>
                            <h2 class="register-title">Rejoignez-nous !</h2>
                            <p>Créez votre compte et commencez votre apprentissage dès aujourd'hui.</p>
                            <div class="mt-4">
                                <small>Déjà inscrit ?</small>
                                <a href="/login" class="btn btn-outline-light btn-sm mt-2" style="border-radius: 50px;">Se connecter</a>
                            </div>
                        </div>
                        <div class="col-md-7 register-right">
                            <h3 style="font-weight: 700; margin-bottom: 30px;">Inscription</h3>
                            
                            <div th:if="${error}" class="alert alert-danger">
                                <i class="fas fa-exclamation-circle me-2"></i><span th:text="${error}"></span>
                            </div>
                            
                            <form th:action="@{/register}" method="post">
                                <div class="mb-3">
                                    <label class="form-label fw-semibold">Nom complet</label>
                                    <div class="input-group">
                                        <span class="input-group-text"><i class="fas fa-user"></i></span>
                                        <input type="text" name="nom" class="form-control" placeholder="Jean Dupont" required>
                                    </div>
                                </div>
                                
                                <div class="mb-3">
                                    <label class="form-label fw-semibold">Email</label>
                                    <div class="input-group">
                                        <span class="input-group-text"><i class="fas fa-envelope"></i></span>
                                        <input type="email" name="email" class="form-control" placeholder="exemple@email.com" required>
                                    </div>
                                </div>
                                
                                <div class="mb-3">
                                    <label class="form-label fw-semibold">Mot de passe</label>
                                    <div class="input-group">
                                        <span class="input-group-text"><i class="fas fa-lock"></i></span>
                                        <input type="password" name="password" class="form-control" placeholder="••••••••" required>
                                    </div>
                                </div>
                                
                                <div class="mb-4">
                                    <label class="form-label fw-semibold mb-3">Vous êtes :</label>
                                    <div class="row">
                                        <div class="col-6">
                                            <div class="role-option" onclick="selectRole('APPRENANT')" id="role-apprenant">
                                                <div class="role-icon">
                                                    <i class="fas fa-graduation-cap"></i>
                                                </div>
                                                <div>
                                                    <strong>Apprenant</strong>
                                                    <br>
                                                    <small>Je veux apprendre</small>
                                                </div>
                                                <input type="radio" name="role" value="APPRENANT" checked>
                                            </div>
                                        </div>
                                        <div class="col-6">
                                            <div class="role-option" onclick="selectRole('FORMATEUR')" id="role-formateur">
                                                <div class="role-icon">
                                                    <i class="fas fa-chalkboard-teacher"></i>
                                                </div>
                                                <div>
                                                    <strong>Formateur</strong>
                                                    <br>
                                                    <small>Je veux enseigner</small>
                                                </div>
                                                <input type="radio" name="role" value="FORMATEUR">
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                
                                <button type="submit" class="btn btn-register">
                                    <i class="fas fa-user-plus me-2"></i>S'inscrire
                                </button>
                            </form>
                            
                            <hr class="my-4">
                            
                            <div class="text-center">
                                <small class="text-muted">
                                    <i class="fas fa-shield-alt me-1"></i>
                                    Vos données sont sécurisées
                                </small>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        function selectRole(role) {
            // Réinitialiser les styles
            document.getElementById('role-apprenant').classList.remove('selected');
            document.getElementById('role-formateur').classList.remove('selected');
            
            // Appliquer le style sélectionné
            if (role === 'APPRENANT') {
                document.getElementById('role-apprenant').classList.add('selected');
                document.querySelector('input[value="APPRENANT"]').checked = true;
            } else {
                document.getElementById('role-formateur').classList.add('selected');
                document.querySelector('input[value="FORMATEUR"]').checked = true;
            }
        }
        
        // Sélection par défaut
        document.getElementById('role-apprenant').classList.add('selected');
        
        // Auto-hide des alertes
        setTimeout(function() {
            var alerts = document.querySelectorAll('.alert');
            alerts.forEach(function(alert) {
                alert.style.display = 'none';
            });
        }, 5000);
    </script>
</body>
</html>
