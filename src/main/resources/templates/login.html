<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion Sécurisée · EduSpark</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #5D3FD3;
            --secondary: #2D3B5E;
            --accent: #8B5CF6;
            --bg-gradient: linear-gradient(145deg, #F9F3FF 0%, #E8F0FE 100%);
        }

        * {
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            margin: 0;
            overflow-x: hidden;
        }

        /* Conteneur principal calqué sur le registre */
        .login-container {
            background: white;
            border-radius: 30px;
            box-shadow: 0 35px 60px -20px rgba(0, 0, 0, 0.2);
            overflow: hidden;
            width: 100%;
            max-width: 1000px;
            display: flex;
            min-height: 580px;
            animation: fadeInUp 0.6s ease-out;
        }

        /* Sidebar gauche (Identique au style sidebar-roles) */
        .sidebar-brand {
            background: var(--secondary);
            width: 350px;
            padding: 50px 40px;
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
        }

        .sidebar-brand::after {
            content: "";
            position: absolute;
            top: -10%;
            right: -10%;
            width: 150px;
            height: 150px;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0) 70%);
            border-radius: 50%;
        }

        /* Contenu du formulaire à droite */
        .form-content {
            flex: 1;
            padding: 60px;
            background: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .login-title {
            font-weight: 800;
            color: #1E293B;
            margin-bottom: 30px;
            letter-spacing: -0.5px;
        }

        .form-label {
            font-size: 0.8rem;
            font-weight: 700;
            color: #6B7280;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .form-control {
            border-radius: 15px;
            padding: 12px 18px;
            border: 2px solid #E5E7EB;
            background: #F9FAFB;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            box-shadow: 0 0 0 4px rgba(93, 63, 211, 0.1);
            border-color: var(--primary);
            background: white;
        }

        .input-group-text {
            background: #F9FAFB;
            border: 2px solid #E5E7EB;
            border-right: none;
            border-radius: 15px 0 0 15px;
            color: #9CA3AF;
        }

        .input-group .form-control {
            border-left: none;
            border-radius: 0 15px 15px 0;
        }

        .btn-login {
            background: var(--primary);
            background: linear-gradient(105deg, var(--primary), var(--accent));
            color: white;
            border: none;
            border-radius: 15px;
            padding: 16px;
            font-weight: 700;
            width: 100%;
            margin-top: 20px;
            transition: all 0.3s;
            box-shadow: 0 10px 20px rgba(93, 63, 211, 0.2);
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 25px rgba(93, 63, 211, 0.3);
            filter: brightness(1.1);
        }

        .alert-custom {
            border-radius: 15px;
            border: none;
            font-size: 0.9rem;
            padding: 15px;
            margin-bottom: 25px;
        }

        .btn-outline-light-custom {
            border: 2px solid rgba(255,255,255,0.3);
            color: white;
            border-radius: 12px;
            padding: 10px 20px;
            text-decoration: none;
            font-size: 0.9rem;
            transition: 0.3s;
            display: inline-block;
        }

        .btn-outline-light-custom:hover {
            background: rgba(255,255,255,0.1);
            border-color: white;
            color: white;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 850px) {
            .login-container { flex-direction: column; }
            .sidebar-brand { width: 100%; padding: 40px; text-align: center; }
            .form-content { padding: 40px 30px; }
        }
    </style>
</head>
<body>

<div class="login-container">
    <!-- GAUCHE : BRANDING -->
    <div class="sidebar-brand">
        <div>
            <i class="fas fa-brain mb-4" style="font-size: 3.5rem;"></i>
            <h2 class="fw-800 mb-3">EduSpark</h2>
            <p class="opacity-75 mb-5">Accédez à vos cours et continuez votre voyage d'apprentissage.</p>
        </div>
        
        <div>
            <p class="small mb-2 opacity-50">Pas encore de compte ?</p>
            <a href="/register" class="btn-outline-light-custom">
                <i class="fas fa-user-plus me-2"></i>S'inscrire gratuitement
            </a>
        </div>
    </div>

    <!-- DROITE : FORMULAIRE -->
    <div class="form-content">
        <h3 class="login-title"><i class="fas fa-sign-in-alt me-3" style="color: var(--primary);"></i>Connexion</h3>
        
        <!-- Messages d'erreur / Déconnexion -->
        <div th:if="${param.error}" class="alert alert-danger alert-custom">
            <i class="fas fa-exclamation-circle me-2"></i> Email ou mot de passe incorrect.
        </div>
        <div th:if="${param.logout}" class="alert alert-success alert-custom" style="background: #ECFDF5; color: #065F46;">
            <i class="fas fa-check-circle me-2"></i> Déconnexion réussie.
        </div>

        <form th:action="@{/login}" method="post">
            <div class="mb-4">
                <label class="form-label">Adresse Email</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-envelope"></i></span>
                    <input type="email" name="username" class="form-control" placeholder="nom@exemple.com" required autofocus>
                </div>
            </div>

            <div class="mb-4">
                <div class="d-flex justify-content-between align-items-center">
                    <label class="form-label">Mot de passe</label>
                    <a href="#" class="small text-decoration-none" style="color: var(--accent); font-weight: 600; margin-bottom: 8px;">Oublié ?</a>
                </div>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-lock"></i></span>
                    <input type="password" name="password" class="form-control" placeholder="••••••••" required>
                </div>
            </div>

            <div class="form-check mb-4">
                <input type="checkbox" class="form-check-input" id="remember" name="remember-me">
                <label class="form-check-label small text-muted" for="remember">Rester connecté sur cet appareil</label>
            </div>

            <button type="submit" class="btn-login">
                SE CONNECTER <i class="fas fa-arrow-right ms-2"></i>
            </button>
        </form>

        <div class="mt-5 text-center">
            <div class="p-3 rounded-4" style="background: #F3F4F6; border: 1px dashed #D1D5DB;">
                <p class="small text-muted mb-1"><i class="fas fa-shield-alt me-2"></i>Vos données sont protégées par cryptage AES-256.</p>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
