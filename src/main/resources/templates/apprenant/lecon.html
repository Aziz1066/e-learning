<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Leçon</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Poppins', sans-serif;
    background: #f5f3ff;
    margin: 0;
    padding: 40px;
}

.container {
    max-width: 900px;
    margin: auto;
    background: white;
    padding: 30px;
    border-radius: 15px;
}

h1 {
    color: #4f46e5;
}

iframe {
    width: 100%;
    height: 600px;
    border: none;
    margin-top: 20px;
}
</style>
</head>

<body>

<div class="container">

    <h1 th:text="${lecon.titre}"></h1>

    <!-- PDF -->
    <div th:if="${lecon.pdfUrl != null}">
        <iframe th:src="${lecon.pdfUrl}"></iframe>
    </div>

    <!-- TEXT -->
    <div th:if="${lecon.pdfUrl == null}"
         th:text="${lecon.contenu}">
    </div>

</div>

</body>
</html>
