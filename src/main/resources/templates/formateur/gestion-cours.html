<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Gestion des Cours</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; font-family: 'Poppins', sans-serif; background: linear-gradient(135deg, #f3e8ff, #ffffff); min-height: 100vh; }
        .header { background: linear-gradient(90deg, #a855f7, #6b21a8); color: white; padding: 20px; text-align: center; font-size: 24px; font-weight: 600; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .container { padding: 30px 40px; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        h2 { color: #6b21a8; margin: 0; }
        .card-table { background: white; border-radius: 15px; padding: 20px; box-shadow: 0 8px 20px rgba(168, 85, 247, 0.15); overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { text-align: left; color: #6b21a8; border-bottom: 2px solid #f3e8ff; padding: 12px; }
        td { padding: 12px; border-bottom: 1px solid #f3e8ff; vertical-align: middle; }
        .course-img { width: 60px; height: 40px; border-radius: 5px; object-fit: cover; }
        .btn { display: inline-block; padding: 8px 18px; border-radius: 12px; text-decoration: none; font-size: 13px; transition: 0.3s; font-weight: 500; border: none; cursor: pointer; color: white; }
        .btn-add { background: #a855f7; }
        .btn-content { background: #6b21a8; margin-right: 5px; }
        .btn-edit { background: #fbbf24; margin-right: 5px; }
        .btn-delete { background: #ef4444; }
        .btn-back { background: #6b7280; margin-top: 20px; }
        .btn:hover { opacity: 0.8; transform: translateY(-2px); }
    </style>
</head>
<body>
<div class="header">👨‍🏫 Gestion de mes Cours</div>
<div class="container">
    <div class="top-bar">
        <h2>Liste de vos formations</h2>
        <a th:href="@{/formateur/cours/nouveau}" class="btn btn-add">➕ Nouveau Cours</a>
    </div>
    <div class="card-table">
        <table>
            <thead>
                <tr>
                    <th>Aperçu</th>
                    <th>Titre</th>
                    <th>Catégorie</th>
                    <th>Niveau</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="c : ${listCourses}">
                    <td><img th:src="${c.imageUrl}" class="course-img" alt="img"></td>
                    <td th:text="${c.titre}" style="font-weight: 600;"></td>
                    <td th:text="${c.categorie}"></td>
                    <td><span th:text="${c.niveau}" style="background: #f3e8ff; padding: 4px 10px; border-radius: 10px; color: #6b21a8; font-size: 11px;"></span></td>
                    <td>
                        <a th:href="@{/formateur/cours/{id}/modules(id=${c.id})}" class="btn btn-content">📂 Contenu</a>
                        <a th:href="@{/formateur/cours/edit/{id}(id=${c.id})}" class="btn btn-edit">Modifier</a>
                        <a th:href="@{/formateur/cours/delete/{id}(id=${c.id})}" class="btn btn-delete" onclick="return confirm('Supprimer ce cours ?')">Supprimer</a>
                    </td>
                </tr>
            </tbody>
        </table>
        <div th:if="${#lists.isEmpty(listCourses)}" style="text-align: center; padding: 20px; color: #666;">
            Aucun cours créé pour le moment.
        </div>
    </div>
    <a th:href="@{/formateur/home}" class="btn btn-back">⬅ Retour au Dashboard</a>
</div>
</body>
</html>
