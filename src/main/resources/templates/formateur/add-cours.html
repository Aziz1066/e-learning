<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Ajouter un Cours</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: #f3e8ff;
            padding: 50px;
        }

        .form-container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            max-width: 600px;
            margin: auto;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        h2 {
            color: #a855f7;
            text-align: center;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
        }

        input, textarea, select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
        }

        .btn-save {
            background: #a855f7;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 25px;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
            margin-top: 10px;
        }

        .btn-save:hover {
            background: #7e22ce;
        }
    </style>
</head>

<body>

<div class="form-container">

    <h2>➕ Créer un nouveau cours</h2>

    <form th:action="@{/formateur/cours/save}"
          th:object="${cours}"
          method="post"
          enctype="multipart/form-data">

        <!-- TITLE -->
        <div class="form-group">
            <label>Titre du cours</label>
            <input type="text"
                   th:field="*{titre}"
                   required
                   placeholder="Ex: Java Avancé">
        </div>

        <!-- CATEGORY -->
        <div class="form-group">
            <label>Catégorie</label>
            <input type="text"
                   th:field="*{categorie}"
                   required
                   placeholder="Ex: Informatique">
        </div>

        <!-- LEVEL -->
        <div class="form-group">
            <label>Niveau</label>

			<select th:field="*{niveau}" required>

			    <option value="" disabled selected>-- Choisir un niveau --</option>

			    <option th:each="n : ${niveaux}"
			            th:value="${n}"
			            th:text="${n}">
			    </option>

			</select>
        </div>

        <!-- DESCRIPTION -->
        <div class="form-group">
            <label>Description</label>
            <textarea th:field="*{description}"
                      rows="4"
                      placeholder="Décrivez le contenu..."></textarea>
        </div>

        <!-- IMAGE -->
        <div class="form-group">
            <label>Image de couverture</label>
            <input type="file" name="file" accept="image/*">
        </div>

        <!-- SUBMIT -->
        <button type="submit" class="btn-save">
            Enregistrer le cours
        </button>

    </form>

</div>

</body>
</html>
