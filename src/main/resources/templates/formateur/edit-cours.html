<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Modifier le cours</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { background: #fcfaff; font-family: 'Poppins', sans-serif; padding: 50px; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); max-width: 600px; margin: auto; }
        .btn-update { background: #fbbf24; color: white; border: none; padding: 10px 20px; border-radius: 10px; cursor: pointer; width: 100%; font-weight: 600; }
        input, textarea, select { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; }
    </style>
</head>
<body>
    <div class="card">
        <h2 style="color: #6b21a8;">✏️ Modifier le cours</h2>
        <form th:action="@{/formateur/cours/save}" th:object="${cours}" method="post" enctype="multipart/form-data">
            <input type="hidden" th:field="*{id}">
            <input type="hidden" th:field="*{imageUrl}"> <label>Titre</label>
            <input type="text" th:field="*{titre}" required>

            <label>Catégorie</label>
            <input type="text" th:field="*{categorie}" required>

            <label>Niveau</label>
            <select th:field="*{niveau}">
                <option th:each="n : ${T(com.fst.elearning.entity.Niveau).values()}" th:value="${n}" th:text="${n}"></option>
            </select>

            <label>Description</label>
            <textarea th:field="*{description}" rows="4"></textarea>

            <label>Changer l'image (optionnel)</label>
            <input type="file" name="file">

            <button type="submit" class="btn-update">Mettre à jour le cours</button>
        </form>
        <br>
        <a th:href="@{/formateur/cours}" style="color: #666; text-decoration: none;">Annuler</a>
    </div>
</body>
</html>
