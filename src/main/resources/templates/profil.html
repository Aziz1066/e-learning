<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Mon Profil · EduSpark</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #6366f1; --bg: #f8fafc; --text: #1e293b; }
        body { background: var(--bg); font-family: 'Plus Jakarta Sans', sans-serif; color: var(--text); padding: 40px; }
        
        .nav-back { max-width: 800px; margin: 0 auto 20px; display: flex; align-items: center; }
        .btn-back { text-decoration: none; color: #64748b; font-weight: 700; font-size: 0.9rem; transition: 0.3s; }
        .btn-back:hover { color: var(--primary); }

        .glass-card { background: white; border-radius: 24px; padding: 40px; max-width: 800px; margin: auto; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .avatar-preview { width: 120px; height: 120px; border-radius: 20px; object-fit: cover; background: #eee; border: 2px solid #e2e8f0; }
        
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        .form-group { display: flex; flex-direction: column; gap: 8px; }
        
        label { font-size: 0.85rem; font-weight: 700; color: #64748b; }
        input { padding: 12px; border-radius: 12px; border: 1px solid #e2e8f0; font-family: inherit; transition: 0.3s; }
        input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1); }
        
        .btn-save { grid-column: span 2; padding: 15px; border-radius: 12px; background: #1e293b; color: white; border: none; font-weight: 700; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .btn-save:hover { background: var(--primary); transform: translateY(-2px); }
        
        .alert-success { background: #dcfce7; color: #166534; padding: 15px; border-radius: 12px; margin-bottom: 20px; font-weight: 600; display: flex; align-items: center; gap: 10px; }
    </style>
</head>
<body>

    <!-- Bouton Retour -->
    <div class="nav-back">
        <a href="/apprenant/home" class="btn-back">
            <i class="fas fa-arrow-left"></i> Retour au catalogue
        </a>
    </div>

    <div class="glass-card">
        <h2 style="margin-bottom: 30px;"><i class="fas fa-user-circle"></i> Paramètres du profil</h2>
        
        <!-- Notification de succès dynamique -->
        <div th:if="${param.success}" class="alert-success">
            <i class="fas fa-check-circle"></i> Profil mis à jour avec succès !
        </div>

        <form th:action="@{/apprenant/profil/update}" method="POST" enctype="multipart/form-data">
            <div style="display: flex; align-items: center; gap: 25px; margin-bottom: 30px;">
                <!-- Aperçu de la photo : Utilise le chemin /uploads/ si dispo, sinon une image par défaut -->
                <img id="imgPreview" 
                     th:src="${apprenant.photo != null ? '/uploads/' + apprenant.photo : 'https://ui-avatars.com/api/?name=' + apprenant.nom}" 
                     class="avatar-preview">
                
                <div>
                    <label for="imageFile" style="cursor: pointer; color: var(--primary); font-weight: 800; text-decoration: underline;">
                        Changer la photo de profil
                    </label>
                    <!-- Le champ file doit s'appeler "imageFile" pour correspondre au Controller[cite: 1] -->
                    <input type="file" id="imageFile" name="imageFile" hidden onchange="previewImage(event)" accept="image/*">
                    <p style="font-size: 0.8rem; color: #64748b; margin-top: 5px;">Format JPG ou PNG (Max 2Mo).</p>
                </div>
            </div>

            <div class="form-grid">
                <!-- Nom complet -->
                <div class="form-group">
                    <label>Nom complet</label>
                    <input type="text" name="nom" th:value="${apprenant.nom}" required placeholder="Ex: Jean Dupont">
                </div>

                <!-- Email (Lecture seule, sert d'identifiant)[cite: 1] -->
                <div class="form-group">
                    <label>Email (Identifiant)</label>
                    <input type="email" th:value="${apprenant.email}" readonly style="background: #f1f5f9; cursor: not-allowed; color: #94a3b8;">
                </div>

                <!-- Date de naissance -->
                <div class="form-group">
                    <label>Date de naissance</label>
                    <input type="date" name="dateNaissance" th:value="${apprenant.dateNaissance}">
                </div>

                <!-- Téléphone -->
                <div class="form-group">
                    <label>Téléphone</label>
                    <input type="tel" name="telephone" th:value="${apprenant.telephone}" placeholder="+216 ...">
                </div>

                <button type="submit" class="btn-save">
                    <i class="fas fa-save"></i> Enregistrer les modifications
                </button>
            </div>
        </form>
    </div>

    <script>
        // Fonction pour prévisualiser l'image avant l'envoi au serveur[cite: 1]
        function previewImage(event) {
            const input = event.target;
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('imgPreview').src = e.target.result;
                };
                reader.readAsDataURL(input.files[0]);
            }
        }
    </script>
</body>
</html>
