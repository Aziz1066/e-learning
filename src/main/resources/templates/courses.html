<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduSpark · Catalogue des Cours</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary: #6366f1;
            --accent: #a855f7;
            --dark: #0f172a;
            --bg-body: #f8fafc;
            --glass: rgba(255, 255, 255, 0.8);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg-body); color: var(--dark); }

        /* BARRE DE NAVIGATION */
        .topbar {
            position: sticky; top: 0; z-index: 1000;
            background: var(--glass);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(226, 232, 240, 0.8);
            padding: 12px 50px;
            display: flex; justify-content: space-between; align-items: center;
        }

        .nav-left { display: flex; align-items: center; gap: 30px; }
        .logo { display: flex; align-items: center; gap: 10px; font-weight: 800; font-size: 1.4rem; color: var(--dark); text-decoration: none; }
        .logo i { color: var(--primary); }

        .nav-links { display: flex; gap: 20px; list-style: none; }
        .nav-links a { text-decoration: none; color: #64748b; font-weight: 600; transition: 0.3s; }
        .nav-links a:hover { color: var(--primary); }

        /* ZONE PROFIL (CERCLE) */
        .nav-right { display: flex; align-items: center; }
        
        .user-profile-link {
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all 0.3s ease;
            padding: 5px 5px 5px 15px;
            border-radius: 50px;
        }

        .user-profile-link:hover {
            background: rgba(99, 102, 241, 0.05);
        }

        .user-name {
            font-weight: 700;
            font-size: 0.9rem;
            color: var(--dark);
        }

        .avatar-circle { 
            width: 45px; 
            height: 45px; 
            background: linear-gradient(135deg, var(--primary), var(--accent)); 
            border-radius: 50%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            color: white; 
            font-weight: 800; 
            font-size: 1.1rem; 
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(99, 102, 241, 0.2);
            border: 2px solid white;
            transition: transform 0.3s ease;
        }

        .user-profile-link:hover .avatar-circle {
            transform: scale(1.05);
            box-shadow: 0 6px 15px rgba(99, 102, 241, 0.3);
        }

        .avatar-circle img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
        }

        /* HERO & GRILLE */
        .hero {
            padding: 80px 50px;
            background: linear-gradient(135deg, #EEF2FF 0%, #F5F3FF 100%);
            border-bottom-left-radius: 60px; border-bottom-right-radius: 60px;
            margin-bottom: 50px;
        }
        .hero h1 { font-size: 2.8rem; font-weight: 800; margin-bottom: 15px; letter-spacing: -1px; }

        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }
        
        .courses-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 25px;
            margin-bottom: 60px;
        }

        .course-card {
            background: white; border-radius: 24px; border: 1px solid #e2e8f0;
            overflow: hidden; transition: 0.4s;
        }
        .course-card:hover { transform: translateY(-10px); box-shadow: 0 20px 40px rgba(0,0,0,0.05); }
        .course-img { height: 180px; width: 100%; object-fit: cover; }
        .course-body { padding: 20px; }
        .category-tag { font-size: 0.7rem; font-weight: 800; color: var(--primary); text-transform: uppercase; margin-bottom: 10px; display: block; }
        
        .btn-primary {
            background: var(--dark); color: white; padding: 10px 20px;
            border-radius: 10px; text-decoration: none; font-weight: 700;
            font-size: 0.85rem; transition: 0.3s;
        }
        .btn-primary:hover { background: var(--primary); }
    </style>
</head>
<body>

    <nav class="topbar">
        <div class="nav-left">
            <a href="/apprenant/home" class="logo"><i class="fas fa-brain"></i> EduSpark</a>
            <ul class="nav-links">
                <li><a href="/apprenant/home">Accueil</a></li>
                <li><a href="/apprenant/mes-cours">Mes Cours</a></li>
            </ul>
        </div>

        <div class="nav-right">
            <!-- SI L'UTILISATEUR EST CONNECTÉ -->
            <div th:if="${apprenant != null}">
                <a th:href="@{/apprenant/profil}" class="user-profile-link" title="Voir mon profil">
                    <span class="user-name" th:text="${apprenant.nom}">Utilisateur</span>
                    <div class="avatar-circle">
                        <!-- Affiche la photo si elle existe -->
                        <img th:if="${apprenant.photo != null}" th:src="@{'/uploads/' + ${apprenant.photo}}" alt="Profil">
                        <!-- Sinon affiche la première lettre du nom -->
                        <span th:if="${apprenant.photo == null}" th:text="${#strings.substring(apprenant.nom, 0, 1)}">U</span>
                    </div>
                </a>
            </div>
            
            <!-- SI NON CONNECTÉ -->
            <div th:if="${apprenant == null}">
                <a href="/login" class="btn-primary">Connexion</a>
            </div>
        </div>
    </nav>

    <header class="hero">
        <div class="container">
            <h1 th:text="${apprenant != null} ? 'Ravi de vous revoir, ' + ${apprenant.nom} + ' ! 👋' : 'Bienvenue sur EduSpark ! 🚀'">
                Ravi de vous revoir !
            </h1>
            <p>Continuez votre apprentissage ou explorez de nouveaux horizons.</p>
        </div>
    </header>

    <main class="container">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
            <h2>Catalogue des formations</h2>
            <span style="color: #64748b;" th:text="${courses != null ? courses.size() : 0} + ' cours disponibles'">0 cours</span>
        </div>

        <div class="courses-grid">
            <div th:each="c : ${courses}" class="course-card">
                <img th:src="${c.imageUrl}" class="course-img" alt="Image du cours">
                <div class="course-body">
                    <span class="category-tag" th:text="${c.categorie}">Catégorie</span>
                    <h3 style="margin-bottom: 15px;" th:text="${c.titre}">Titre du cours</h3>
                    <div style="display:flex; justify-content: space-between; align-items:center;">
                        <span style="font-size: 0.8rem; color:#64748b;">
                            <i class="fas fa-chalkboard-teacher"></i> 
                            <span th:text="${c.formateur != null ? c.formateur.nom : 'Admin'}">Expert</span>
                        </span>
                        <a th:href="@{'/apprenant/course/' + ${c.id}}" class="btn-primary">Explorer</a>
                    </div>
                </div>
            </div>
        </div>
    </main>

</body>
</html>
