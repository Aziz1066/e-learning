<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>All Courses</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins', sans-serif;
}

/* LIGHT PREMIUM BACKGROUND */
body {
    min-height:100vh;
    padding:40px;
    background: linear-gradient(120deg, #f8fafc, #eef2ff, #fdf4ff);
    position: relative;
    overflow-x:hidden;
}

/* COLOR BLOBS (PRO LOOK LIKE COURSERA STYLE) */
body::before,
body::after {
    content:"";
    position:absolute;
    width:450px;
    height:450px;
    border-radius:50%;
    filter: blur(120px);
    z-index:0;
}

body::before {
    background:#93c5fd;
    top:-120px;
    left:-120px;
}

body::after {
    background:#f0abfc;
    bottom:-150px;
    right:-120px;
}

/* TITLE */
.page-title {
    font-size: 38px;
    font-weight: 600;
    text-align: center;
    margin-bottom: 40px;
    background: linear-gradient(90deg, #2563eb, #7c3aed, #db2777);
    -webkit-background-clip: text;
    color: transparent;
    position: relative;
    z-index: 2;
}

/* GRID */
.courses-grid {
    display:grid;
    grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
    gap:25px;
    position: relative;
    z-index: 2;
}

/* CARD */
.course-card {
    background: white;
    border-radius:20px;
    overflow:hidden;
    box-shadow: 0 10px 25px rgba(0,0,0,0.08);
    transition:0.35s ease;
    border:1px solid #eef2ff;
}

.course-card:hover {
    transform: translateY(-10px);
    box-shadow: 0 20px 40px rgba(99,102,241,0.15);
}

/* IMAGE */
.course-image img {
    width:100%;
    height:200px;
    object-fit:cover;
    transition:0.4s ease;
}

.course-card:hover img {
    transform: scale(1.05);
}

/* IMAGE OVERLAY */
.course-image {
    position:relative;
}

.course-image::after {
    content:"";
    position:absolute;
    inset:0;
    background: linear-gradient(to top, rgba(0,0,0,0.25), transparent);
}

/* CONTENT */
.course-content {
    padding:18px;
}

/* TITLE */
.course-title {
    font-size:20px;
    font-weight:600;
    color:#1e293b;
    margin-bottom:8px;
}

/* DESC */
.course-desc {
    font-size:13px;
    color:#64748b;
    margin-bottom:14px;
    line-height:1.5;
}

/* TAGS */
.course-meta {
    display:flex;
    gap:8px;
    margin-bottom:15px;
}

.tag {
    padding:5px 12px;
    border-radius:20px;
    font-size:11px;
    font-weight:500;
    color:white;
}

/* colorful but soft */
.category {
    background: linear-gradient(135deg, #60a5fa, #3b82f6);
}

.level {
    background: linear-gradient(135deg, #a78bfa, #8b5cf6);
}

/* FOOTER */
.course-footer {
    display:flex;
    justify-content:space-between;
    align-items:center;
}

/* TEACHER */
.teacher {
    font-size:12px;
    color:#64748b;
}

/* BUTTONS */
.btn {
    background: linear-gradient(135deg, #2563eb, #7c3aed);
    border:none;
    padding:8px 14px;
    color:white;
    border-radius:12px;
    cursor:pointer;
    font-size:12px;
    transition:0.3s ease;
    text-decoration:none;
    display:inline-block;
}

.btn:hover {
    transform: scale(1.05);
    box-shadow: 0 8px 18px rgba(99,102,241,0.25);
}

/* ENROLL BUTTON */
.enroll-btn {
    background: linear-gradient(135deg, #22c55e, #16a34a);
    margin-left:8px;
}

.enroll-btn:hover {
    box-shadow: 0 8px 18px rgba(34,197,94,0.25);
}

/* ANIMATION */
.course-card {
    animation: fadeUp 0.6s ease forwards;
}

@keyframes fadeUp {
    from {opacity:0; transform:translateY(20px);}
    to {opacity:1; transform:translateY(0);}
}

/* EMPTY */
.empty-box {
    text-align:center;
    color:#64748b;
    padding:50px;
    font-size:15px;
    position: relative;
    z-index:2;
}

</style>
</head>

<body>

<h2 class="page-title">📚 Explore Courses</h2>

<div th:if="${#lists.isEmpty(courses)}" class="empty-box">
    No courses available.
</div>

<div class="courses-grid" th:if="${!#lists.isEmpty(courses)}">

    <div class="course-card" th:each="c : ${courses}">

        <div class="course-image">
            <img th:src="@{'/images/' + ${c.imageUrl}}" alt="course image">
        </div>

        <div class="course-content">

            <h3 class="course-title" th:text="${c.titre}"></h3>

            <p class="course-desc" th:text="${c.description}"></p>

            <div class="course-meta">
                <span class="tag category" th:text="${c.categorie}"></span>
                <span class="tag level" th:text="${c.niveau}"></span>
            </div>

            <div class="course-footer">

                <span class="teacher"
                      th:text="${c.formateur != null ? c.formateur.nom : 'Unknown'}">
                </span>

                <div>
                    <a th:href="@{'/course/' + ${c.id}}">
                        <button class="btn">View</button>
                    </a>

                    <a th:href="@{'/enroll/' + ${c.id}}">
                        <button class="btn enroll-btn">Enroll</button>
                    </a>
                </div>

            </div>

        </div>
    </div>

</div>

</body>
</html>
