<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Gestion des Leçons</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; font-family: 'Poppins', sans-serif; background: #fcfaff; }
        .header { background: linear-gradient(90deg, #10b981, #059669); color: white; padding: 20px; text-align: center; font-size: 22px; }
        .container { padding: 30px; max-width: 900px; margin: auto; }
        .card { background: white; border-radius: 15px; padding: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .lecon-item { display: flex; justify-content: space-between; align-items: center; padding: 15px; border-bottom: 1px solid #eee; }
        .btn { padding: 8px 15px; border-radius: 10px; text-decoration: none; font-size: 13px; color: white; border: none; cursor: pointer; display: inline-block; }
        .btn-save { background: #10b981; width: 100%; margin-top: 10px; font-weight: 600; }
        .btn-delete { background: #ef4444; }
        .btn-file { background: #6b7280; font-size: 11px; margin-top: 5px; }
        input, textarea { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        label { font-size: 14px; font-weight: 600; color: #374151; }
    </style>
</head>
<body>
    <div class="header">📖 Gestion des Leçons : <span th:text="${module.titre}"></span></div>
    <div class="container">
        <a th:href="@{/formateur/cours/{id}/modules(id=${module.cours.id})}" style="color: #10b981; text-decoration: none; font-weight: 600;">⬅ Retour aux modules</a>
        
        <div class="card" style="margin-top: 20px;">
            <h3>➕ Ajouter une leçon & support</h3>
            <form th:action="@{/formateur/modules/{id}/lecons/save(id=${module.id})}" th:object="${newLecon}" method="post" enctype="multipart/form-data">
                <input type="text" th:field="*{titre}" placeholder="Titre de la leçon" required>
                <textarea th:field="*{contenu}" rows="4" placeholder="Contenu textuel ou lien vidéo (Markdown supporté)"></textarea>
                
                <label>Document de support (PDF/Image) :</label>
                <input type="file" name="file">
                
                <div style="display: flex; gap: 10px;">
                    <input type="number" th:field="*{dureeMin}" placeholder="Durée (min)" style="flex: 1;">
                    <input type="number" th:field="*{ordre}" placeholder="Ordre" style="flex: 1;">
                </div>
                <button type="submit" class="btn btn-save">Publier la leçon</button>
            </form>
        </div>

        <div class="card">
            <h3>Contenu du module</h3>
            <div th:each="l : ${lecons}" class="lecon-item">
                <div>
                    <strong th:text="${l.ordre + '. ' + l.titre}"></strong>
                    <div style="font-size: 12px; color: #777;">
                        <span th:text="${l.dureeMin} + ' min'"></span>
                        <span th:if="${l.supportPath}" style="margin-left: 10px; color: #10b981;">📄 Support inclus</span>
                    </div>
                </div>
                <div style="display: flex; gap: 5px;">
                    <a th:if="${l.supportPath}" th:href="${l.supportPath}" class="btn btn-file" target="_blank">Voir PDF</a>
                    <a th:href="@{/formateur/lecons/delete/{id}(id=${l.id})}" class="btn btn-delete" onclick="return confirm('Supprimer cette leçon ?')">🗑️</a>
                </div>
            </div>
            <div th:if="${#lists.isEmpty(lecons)}" style="text-align: center; color: #999; padding: 20px;">
                Aucune leçon publiée pour ce module.
            </div>
        </div>
    </div>
</body>
</html>
