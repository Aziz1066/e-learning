<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Tous les Modules</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; font-family: 'Poppins', sans-serif; background: #fcfaff; }
        .header { background: linear-gradient(90deg, #a855f7, #6b21a8); color: white; padding: 20px; text-align: center; font-size: 24px; }
        .container { padding: 30px; max-width: 1000px; margin: auto; }
        .module-card { background: white; border-radius: 15px; padding: 20px; margin-bottom: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); display: flex; justify-content: space-between; align-items: center; }
        .course-badge { background: #f3e8ff; color: #6b21a8; padding: 5px 10px; border-radius: 8px; font-size: 12px; }
        .btn-action { background: #a855f7; color: white; text-decoration: none; padding: 8px 15px; border-radius: 10px; font-size: 13px; }
    </style>
</head>
<body>
    <div class="header">🧩 Tous les Modules de Formation</div>
    <div class="container">
        <a th:href="@{/formateur/home}" style="color: #a855f7; text-decoration: none;">⬅ Retour au Dashboard</a>
        <br><br>
        <div th:each="m : ${modules}" class="module-card">
            <div>
                <span class="course-badge" th:text="${m.cours.titre}">Nom du Cours</span>
                <h3 th:text="${m.titre}" style="margin: 10px 0 0 0;">Titre du Module</h3>
            </div>
            <a th:href="@{/formateur/modules/{id}/lecons(id=${m.id})}" class="btn-action">Gérer les leçons</a>
        </div>
    </div>
</body>
</html>
