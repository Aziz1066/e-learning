<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Apprenant Dashboard</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #f3e8ff, #ffffff);
            min-height: 100vh;
        }

        /* HEADER */
        .header {
            background: linear-gradient(90deg, #c084fc, #a855f7);
            color: white;
            padding: 20px;
            text-align: center;
            font-size: 24px;
            font-weight: 600;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        /* SEARCH BAR */
        .search-container {
            display: flex;
            justify-content: center;
            margin: 30px;
        }

        .search-box {
            width: 100%;
            padding: 12px;
            border-radius: 25px;
            border: 2px solid #d8b4fe;
            outline: none;
            font-size: 16px;
            transition: 0.3s;
        }

        .search-box:focus {
            border-color: #a855f7;
            box-shadow: 0 0 10px #d8b4fe;
        }

        /* COURSES GRID */
        .courses {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            padding: 20px 40px;
        }

        .card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 8px 20px rgba(168, 85, 247, 0.15);
            transition: 0.3s;
            display: flex;
            flex-direction: column;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 25px rgba(168, 85, 247, 0.25);
        }

        .course-img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 10px;
            margin-bottom: 15px;
            background-color: #f3e8ff;
        }

        .course-title {
            font-size: 18px;
            font-weight: 600;
            color: #6b21a8;
        }

        .course-desc {
            font-size: 14px;
            color: #666;
            margin-top: 10px;
            flex-grow: 1;
        }

        .course-meta {
            margin-top: 10px;
            font-size: 12px;
            display: flex;
            gap: 10px;
        }

        .badge {
            background: #f3e8ff;
            color: #a855f7;
            padding: 4px 10px;
            border-radius: 12px;
            font-weight: 600;
        }

        .btn {
            margin-top: 15px;
            display: inline-block;
            padding: 10px 15px;
            background: #a855f7;
            color: white;
            border-radius: 20px;
            text-decoration: none;
            font-size: 14px;
            transition: 0.3s;
            text-align: center;
        }

        .btn:hover {
            background: #7e22ce;
        }

        /* PAGINATION */
        .pagination {
            display: flex;
            justify-content: center;
            padding: 20px;
            gap: 5px;
        }

        .page-link {
            padding: 8px 16px;
            background: white;
            color: #a855f7;
            border: 1px solid #d8b4fe;
            text-decoration: none;
            border-radius: 5px;
            transition: 0.3s;
        }

        .page-link.active {
            background: #a855f7;
            color: white;
        }

        .no-results {
            text-align: center;
            grid-column: 1 / -1;
            padding: 50px;
            color: #666;
        }

    </style>
</head>

<body>

<div class="header">
    🎓 Apprenant Dashboard
</div>

<div class="search-container">
    <form th:action="@{/apprenant/home}" method="get" style="width: 50%;">
        <input type="text" name="keyword" th:value="${keyword}" 
               class="search-box" placeholder="🔍 Rechercher un cours par titre...">
    </form>
</div>

<div class="courses">

    <div class="card" th:each="c : ${listCourses}">
        <img th:src="${c.imageUrl != null ? c.imageUrl : 'https://via.placeholder.com/300x150?text=No+Image'}" 
             class="course-img" alt="Image du cours">
        
        <div class="course-title" th:text="${c.titre}">Titre du cours</div>
        
        <div class="course-meta">
            <span class="badge" th:text="${c.categorie}">Catégorie</span>
            <span class="badge" th:text="${c.niveau}">Niveau</span>
        </div>

        <div class="course-desc" th:text="${c.description}">Description du cours</div>
        
        <a th:href="@{/apprenant/cours/{id}(id=${c.id})}" class="btn">Voir cours</a>
    </div>

    <div class="no-results" th:if="${#lists.isEmpty(listCourses)}">
        <p>Aucun cours ne correspond à votre recherche.</p>
    </div>

</div>

<div class="pagination" th:if="${pages != null and pages.length > 1}">
    <a th:each="page, status : ${pages}" 
       th:href="@{/apprenant/home(page=${status.index}, keyword=${keyword})}" 
       th:text="${status.index + 1}"
       class="page-link"
       th:classappend="${status.index == currentPage} ? 'active'">
    </a>
</div>

</body>
</html>
